<title>CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#ffffff; --surface:#ffffff; --surface2:#f5f5f5; --border:#e8e8e8;
  --text:#0a0a0a; --text2:#555555; --text3:#aaaaaa;
  --navy:#0a0a0a; --navy2:#1a1a1a; --accent:#0a0a0a; --accent2:#444444;
  --green:#1a7a3c; --green-bg:#f0faf4; --red:#c0392b; --red-bg:#fef5f4;
  --amber:#a05c00; --amber-bg:#fdf6ed; --blue:#1a5fa0; --blue-bg:#f0f6fd;
  --r:12px; --r-sm:8px; --shadow:0 1px 4px rgba(0,0,0,.06); --shadow-lg:0 4px 20px rgba(0,0,0,.09);
  --sidebar:240px;
  font-size:17px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Outfit',sans-serif;font-size:1rem;background:var(--bg);color:var(--text);overflow:hidden}

#app{display:flex;flex-direction:column;height:100dvh}
#view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#view::-webkit-scrollbar{display:none}

.hdr{background:#fff;border-bottom:1.5px solid var(--border);padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-brand{display:flex;align-items:center;gap:11px}
.logo{width:40px;height:40px;border-radius:11px;flex-shrink:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff}
.hdr-text .nm{font-weight:700;font-size:17px;color:#0a0a0a}
.hdr-text .sb{font-size:12px;color:var(--text3);margin-top:1px}
.sync-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border)}
.s-ok{background:#f5faf7;color:var(--green);border-color:#c8e6d4}
.s-err{background:#fef5f4;color:var(--red);border-color:#f5c6c2}
.s-wait{background:#f5f5f5;color:var(--text3);border-color:var(--border)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.s-ok .sync-dot{animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.bnav{flex-shrink:0;background:var(--surface);border-top:1.5px solid var(--border);display:flex;align-items:stretch;padding-bottom:env(safe-area-inset-bottom,0px)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;background:none;border:none;cursor:pointer;color:var(--text3);font-family:'Outfit',sans-serif;transition:color .15s}
.bn .ico{font-size:24px;line-height:1}
.bn .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.bn.on{color:var(--accent)}
.bn-plus{width:56px;height:56px;margin-top:-16px;border-radius:50%;background:#0a0a0a;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.25);transition:transform .15s}
.bn-plus:active{transform:scale(.92)}
.bn-plus svg{width:26px;height:26px;stroke:#fff;stroke-width:2.8;fill:none}

@media(min-width:700px){
  :root{font-size:18px}
  #app{flex-direction:row;height:100dvh}
  .hdr{display:none} .bnav{display:none}
  #sidebar{width:var(--sidebar);flex-shrink:0;background:#fff;border-right:1.5px solid var(--border);display:flex;flex-direction:column;padding:0;overflow:hidden}
  .sb-brand{padding:26px 22px 22px;border-bottom:1.5px solid var(--border)}
  .sb-logo{width:50px;height:50px;border-radius:13px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:19px;color:#fff;margin-bottom:12px}
  .sb-name{font-weight:800;font-size:20px;color:#0a0a0a}
  .sb-sub{font-size:13px;color:var(--text3);margin-top:3px}
  .sb-sync{margin-top:12px}
  .sb-nav{flex:1;padding:18px 13px;display:flex;flex-direction:column;gap:5px}
  .sn{display:flex;align-items:center;gap:13px;padding:13px 16px;border-radius:11px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;transition:all .15s;text-align:left;width:100%}
  .sn .ico{font-size:20px;width:26px;text-align:center}
  .sn:hover{background:var(--surface2);color:var(--text)}
  .sn.on{background:#0a0a0a;color:#fff}
  .sn-add{margin:8px 13px 22px;padding:14px 16px;border-radius:11px;background:#0a0a0a;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:all .15s}
  .sn-add:active{transform:scale(.97)}
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #view{flex:1;overflow-y:auto;overflow-x:hidden}
  #view::-webkit-scrollbar{width:6px}
  #view::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
}

.page{padding:20px}
@media(min-width:700px){.page{padding:30px 36px;max-width:960px}}
.page-title{font-size:26px;font-weight:800;margin-bottom:20px}
@media(min-width:700px){.page-title{font-size:30px}}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(min-width:700px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--surface);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.kpi.big{grid-column:1/-1;background:#0a0a0a}
@media(min-width:700px){.kpi.big{grid-column:span 2}}
.kpi-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
.kpi.big .kpi-lbl{color:rgba(255,255,255,.5)}
.kpi-val{font-size:40px;font-weight:900;line-height:1;color:var(--text)}
.kpi.big .kpi-val{color:#ffffff;font-size:52px}
.kpi-sub{font-size:13px;color:var(--text3);margin-top:5px}
.kpi.big .kpi-sub{color:#ffffff;font-size:16px;font-weight:600;margin-top:8px}
.kpi.green{background:var(--green-bg)}
.kpi.green .kpi-val{color:var(--green);font-size:32px}
.kpi.green .kpi-lbl{color:var(--green)}

.card{background:var(--surface);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-bottom:12px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-ttl{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3)}

.task{background:var(--surface);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:13px;box-shadow:var(--shadow);margin-bottom:8px;cursor:pointer;transition:transform .12s;border-left:4px solid transparent}
.task:active{transform:scale(.988)}
.task.ov{background:var(--red-bg);border-left-color:var(--red)}
.task.td{background:var(--amber-bg);border-left-color:var(--amber)}
.task.sn2{background:var(--blue-bg);border-left-color:var(--blue)}
.task-ico{font-size:26px;flex-shrink:0}
.task-info{flex:1;min-width:0}
.task-name{font-weight:700;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font-size:14px;color:var(--text2);margin-top:3px}
.task-badge{font-size:12px;font-weight:700;text-transform:uppercase;padding:4px 11px;border-radius:20px;flex-shrink:0}
.tb-ov{background:var(--red-bg);color:var(--red)}
.tb-td{background:var(--amber-bg);color:var(--amber)}
.tb-sn{background:var(--blue-bg);color:var(--blue)}

@media(min-width:700px){#leads-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.lead-card{margin-bottom:0!important}}
.lead-card{background:var(--surface);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-bottom:12px;border-left:4px solid var(--border);cursor:pointer;transition:transform .12s,box-shadow .12s}
.lead-card:active{transform:scale(.988)}
.lead-card:hover{box-shadow:var(--shadow-lg)}
.lead-card.hot{border-left-color:var(--red)}
.lead-card.warm{border-left-color:var(--amber)}
.lead-card.cold{border-left-color:var(--blue)}
.lc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.lc-name{font-weight:800;font-size:18px}
.lc-phone{font-size:15px;color:var(--text2);margin-top:3px}
.qb{font-size:12px;font-weight:700;text-transform:uppercase;padding:4px 11px;border-radius:20px}
.qb-hot{background:var(--red-bg);color:var(--red)}
.qb-warm{background:var(--amber-bg);color:var(--amber)}
.qb-cold{background:var(--blue-bg);color:var(--blue)}
.lc-tags{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0}
.tag{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;padding:4px 10px;border-radius:6px}

const $=id=>document.getElementById(id);

const fmtDate=d=>{if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});};
const daysTo=d=>d?Math.ceil((new Date(d)-new Date(today()))/86400000):null;
const isPast=d=>d&&d<today();
const isToday2=d=>d===today();

let toTm;
window.toast=msg=>{const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toTm);toTm=setTimeout(()=>t.classList.remove('show'),2800);};

function setSS(s){
  ['sync-chip','sync-chip2'].forEach(id=>{
    const el=$(id);if(!el)return;
    const base=isTab()?'sync-chip sb-sync ':'sync-chip ';
    el.className=base+`s-${s}`;
    const sp=el.querySelector('span');
    if(sp)sp.textContent=s==='ok'?'Synced':s==='err'?'Offline':'Syncing';
  });
}

onValue(leadsRef,snap=>{

},()=>{setSS('err');$('splash').classList.add('gone');toast('⚠️ Offline — check internet');});
setTimeout(()=>$('splash').classList.add('gone'),7000);

const hr=new Date().getHours();
const greet=`${hr<12?'Morning':hr<17?'Afternoon':'Evening'}, Sandesh 👋`;
['hdr-sub','sb-sub'].forEach(id=>{const el=$(id);if(el)el.textContent=greet;});

function fmt12(t){
  if(!t)return '';
  const [h,m]=t.split(':').map(Number);
  if(isNaN(h)||isNaN(m))return t;
  const ampm=h>=12?'PM':'AM';
  const h12=h%12||12;
  return h12+':'+(m<10?'0'+m:m)+' '+ampm;
}
/* ═══ FOLLOW-UP REMINDERS ═══ */
function scheduleReminders(){
  if(!('Notification' in window))return;
  const a=Object.values(leads);
  const todayStr=today();
  a.forEach(l=>{
    if(l.followupStatus!=='Pending'||!l.followupDate||!l.followupTime)return;
    if(l.stage==='Closed Won'||l.stage==='Closed Lost')return;
    if(l.followupDate!==todayStr)return;
    const [h,m]=l.followupTime.split(':').map(Number);
    const now=new Date();
    const remind=new Date();
    remind.setHours(h,m,0,0);
    const diff=remind-now;
    if(diff>0&&diff<86400000){
      const key='rem_'+l.id+'_'+l.followupDate+'_'+l.followupTime;
      if(sessionStorage.getItem(key))return;
      sessionStorage.setItem(key,'1');
      setTimeout(()=>{
        if(Notification.permission==='granted'){
          new Notification('📞 Follow-up Reminder',{
            body:`${l.name} — ${l.project}\n⏰ ${fmt12(l.followupTime)} · ${l.followupMode||'Call'}`,
            icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%230a0a0a"/><text y=".9em" font-size="80" x="10">📞</text></svg>',
            tag:l.id
          });
        }
      },diff);
    }
  });
}

function requestNotifPermission(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default'){
    Notification.requestPermission().then(p=>{
      if(p==='granted'){toast('🔔 Reminders enabled!');scheduleReminders();}
    });
  } else if(Notification.permission==='granted'){
    scheduleReminders();
  }
}

// Run scheduler every minute to catch new leads
setInterval(()=>{if(Object.keys(leads).length)scheduleReminders();},60000);


window.goToStage=s=>{

};

};

      <div class="page-title" style="margin-bottom:0">Today's Dashboard</div>
      <div style="background:#f5a623;border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:16px;flex-shrink:0">
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:900;color:#0a0a0a;line-height:1">${dayName}</div>
          <div style="font-size:15px;font-weight:700;color:rgba(0,0,0,.6);margin-top:3px">${dateStr}</div>
        </div>
        <div style="width:1.5px;height:36px;background:rgba(0,0,0,.15);flex-shrink:0"></div>
        <div style="text-align:center">
          <div style="font-size:26px;font-weight:900;color:#0a0a0a;line-height:1;font-variant-numeric:tabular-nums" id="live-clock">--:--</div>
          <div style="font-size:13px;font-weight:600;color:rgba(0,0,0,.5);margin-top:3px" id="live-ampm">--</div>
        </div>
      </div>
    </div>
    <div class="kpi-grid">
      <div class="kpi big"><div class="kpi-lbl">Total Leads</div><div class="kpi-val">${total}</div><div class="kpi-sub">+${thisM} added this month</div></div>
      <div class="kpi"><div class="kpi-lbl">SV Done</div><div class="kpi-val" style="font-size:32px">${svD}</div><div class="kpi-sub">${total?Math.round(svD/total*100):0}% of leads</div></div>
      <div class="kpi"><div class="kpi-lbl">Meetings</div><div class="kpi-val" style="font-size:32px">${mtD}</div><div class="kpi-sub">${total?Math.round(mtD/total*100):0}% of leads</div></div>
      <div class="kpi green"><div class="kpi-lbl">Closed Won</div><div class="kpi-val">${won}</div><div class="kpi-sub">${total?Math.round(won/total*100):0}% win rate</div></div>
    </div>
    <div class="sec-hdr"><div class="sec-ttl">Pipeline</div></div>
    <div class="card">${pipelineBars()}</div>
    <div class="sec-hdr" style="margin-top:4px">
      <div class="sec-ttl">Action Required</div>
      ${cnt?`<span style="background:var(--red-bg);color:var(--red);font-size:13px;font-weight:800;padding:4px 11px;border-radius:20px">${cnt}</span>`:''}
    </div>
    ${!cnt?`<div class="empty" style="padding:30px 0"><div class="ei">✅</div><div class="et">All caught up!</div><div class="es">No pending follow-ups</div></div>`:''}
    ${ov.map(l=>taskRow(l,'ov','🚨','OVERDUE',l.followupTime)).join('')}
    ${td.map(l=>taskRow(l,'td','🔔','TODAY',l.followupTime)).join('')}
    ${sn.map(l=>taskRow(l,'sn2','📅',daysTo(l.followupDate)+'d away',l.followupTime)).join('')}
  </div>`;
  // live clock
  function tickClock(){
    const c=$('live-clock'),a=$('live-ampm');
    if(!c)return;
    const n=new Date();
    let h=n.getHours(),m=n.getMinutes(),ampm=h>=12?'PM':'AM';
    h=h%12||12;
    c.textContent=`${h}:${String(m).padStart(2,'0')}`;
    if(a)a.textContent=ampm;
  }
  tickClock();
  clearInterval(window._clk);
  window._clk=setInterval(tickClock,1000);
}

function taskRow(l,cls,ico,badge,time){
  const timeStr=time?fmt12(time):'';
  return`<div class="task ${cls}" onclick="openDetail('${l.id}')">
    <div class="task-ico">${ico}</div>
    <div class="task-info">
      <div class="task-name">${l.name}</div>
      <div class="task-meta">${l.project} · ${l.stage} · ${l.followupMode||'Call'}</div>
      ${timeStr?`<div style="font-size:13px;font-weight:800;color:#a05c00;margin-top:2px">⏰ ${timeStr}</div>`:''}
    </div>
    <span class="task-badge tb-${cls==='sn2'?'sn':cls}">${badge}</span>
  </div>`;
}

function pipelineBars(){
  const a=arr(),cnts={};
  STAGES.forEach(s=>cnts[s]=0);
  a.forEach(l=>{if(cnts[l.stage]!==undefined)cnts[l.stage]++;});
  const active=STAGES.filter(s=>cnts[s]>0);
  if(!active.length)return'<div style="color:var(--text3);font-size:15px;text-align:center;padding:14px">Add leads to see pipeline</div>';
  const max=Math.max(...active.map(s=>cnts[s]),1);
  return active.map(s=>`<div class="funnel-stage" onclick="goToStage('${s}')" style="cursor:pointer"><div class="fs-name">${STAGE_ICONS[s]||''} ${s}</div><div class="fs-bar"><div class="fs-fill${s==='Closed Won'?' won':''}" style="width:${cnts[s]/max*100}%"></div></div><div class="fs-count" style="font-weight:800">${cnts[s]}</div></div>`).join('');
}

/* ═══ LEADS ═══ */
function renderLeads(){
  $('view').innerHTML=`<div class="page" style="padding-bottom:0">
    <div class="page-title">Leads</div>
    <div class="sw"><span class="si-ico">🔍</span><input class="si" id="si" placeholder="Search name or phone…" oninput="filterL(this.value)"/></div>
    <div class="chips">${['all','Hot','Warm','Cold','SV Scheduled','SV Done','Meeting Done','Negotiation','On Hold'].map(f=>`<div class="chip${filterQ===f?' on':''}" onclick="setFQ('${f}',this)">${f==='all'?'All Leads':f}</div>`).join('')}</div>
  </div>
  <div style="padding:0 20px 20px"><div id="leads-grid">${buildCards('')}</div></div>`;
}

function buildCards(search){
  const sl=search.toLowerCase();
  let f=arr().filter(l=>{
    const m=!sl||l.name.toLowerCase().includes(sl)||(l.phone||'').includes(sl);
    const isClosed=l.stage==='Closed Won'||l.stage==='Closed Lost';
    if(filterQ==='all')return m&&!isClosed;
    if(['Hot','Warm','Cold'].includes(filterQ))return m&&l.quality===filterQ&&!isClosed;
    return m&&l.stage===filterQ;
  }).sort((a,b)=>{const da=b.dateAdded||'';const db2=a.dateAdded||'';const cmp=da.localeCompare(db2);return cmp!==0?cmp:(b.id||'').localeCompare(a.id||'');});
  if(!f.length)return`<div class="empty"><div class="ei">${arr().length?'🔍':'👤'}</div><div class="et">${arr().length?'No results':'No leads yet'}</div><div class="es">${arr().length?'Try a different filter':'Tap + to add your first lead'}</div></div>`;
  return f.map(l=>{
    const qc=(l.quality||'cold').toLowerCase();
    const fu=l.followupDate&&l.followupStatus==='Pending';
    const fuCls=fu?(isPast(l.followupDate)?'fu-ov':isToday2(l.followupDate)?'fu-td':'fu-sn'):'';
    return`<div class="lead-card ${qc}" onclick="openDetail('${l.id}')">
      <div class="lc-top"><div><div class="lc-name">${l.name}</div><div class="lc-phone">📞 ${l.phone}</div></div><span class="qb qb-${qc}">${l.quality}</span></div>
      <div class="lc-tags"><span class="stag">${STAGE_ICONS[l.stage]||''} ${l.stage}</span><span class="tag">${l.project}</span><span class="tag">${l.config}</span><span class="tag">₹${l.budget}</span></div>
      ${fu?`<div class="lc-fu ${fuCls}">🔔 Follow-up: ${fmtDate(l.followupDate)}${l.followupTime?' at '+fmt12(l.followupTime):''}${isPast(l.followupDate)?' — OVERDUE':isToday2(l.followupDate)?' — TODAY':''}</div>`:''}
      <div class="lc-btns" onclick="event.stopPropagation()">
        <button class="lb lb-sv${l.svDone?' done':''}" onclick="qSV('${l.id}')">📍 ${l.svDone?'SV ✓':'Mark SV'}</button>
        <button class="lb lb-mt${l.meetingDone?' done':''}" onclick="qMt('${l.id}')">🤝 ${l.meetingDone?'Met ✓':'Mark Meet'}</button>
        <button class="lb lb-go" onclick="openDetail('${l.id}')">›</button>
      </div>
    </div>`;
  }).join('');
}
window.setFQ=(f,el)=>{filterQ=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');const g=$('leads-grid');if(g)g.innerHTML=buildCards($('si')?.value||'');};
window.filterL=v=>{const g=$('leads-grid');if(g)g.innerHTML=buildCards(v);};

  if(!phone){toast('❌ Phone required');return;}
  try{
    await update(ref(db,'leads/'+id),{
      name,
      phone,
      quality:document.getElementById('ef-quality').value,
      source:document.getElementById('ef-source').value,
      project:document.getElementById('ef-project').value,
      config:document.getElementById('ef-config').value,
      budget:document.getElementById('ef-budget').value,
      followupDate:document.getElementById('ef-fudate').value,
      followupTime:document.getElementById('ef-futime').value||'',
      followupMode:document.getElementById('ef-fumode').value,
      notes:document.getElementById('ef-notes').value.trim(),
    });
    toast('✅ Lead updated!');
    nav('detail');
  }catch(e){toast('❌ Update failed');}
};

window.checkDupPhone=v=>{
  const warn=$('dup-warn');
  if(!warn)return;
  const clean=v.replace(/\D/g,'');
  if(clean.length<10){warn.style.display='none';return;}
  const found=Object.values(leads).find(l=>l.phone&&l.phone.replace(/\D/g,'')===clean);
  if(found){
    warn.style.display='block';
    warn.innerHTML='⚠️ <strong>Duplicate!</strong> '+found.name+' already exists with this number &nbsp;·&nbsp; Stage: '+found.stage+'&nbsp;·&nbsp; <a href="#" onclick="openDetail(\''+found.id+'\');return false;" style="color:#856404;font-weight:800;text-decoration:underline">View Lead →</a>';
  } else {
    warn.style.display='none';
  }
};
window.saveLead=async()=>{
  const name=$('fn').value.trim(),phone=$('fp').value.trim();
  if(!name){toast('❌ Name required');return;}
  if(!phone){toast('❌ Phone required');return;}

  // Duplicate check by phone
  const cleanPhone=phone.replace(/\D/g,'');
  const phoneDup=Object.values(leads).find(l=>l.phone&&l.phone.replace(/\D/g,'')===cleanPhone);
  if(phoneDup){
    const msg='⚠️ Duplicate Lead!\n\n"'+phoneDup.name+'" already exists with this number.\nStage: '+phoneDup.stage+'\nProject: '+phoneDup.project+'\n\nStill want to add?';
    if(!confirm(msg))return;
  }

  // Duplicate check by name
  if(!phoneDup){
    const cleanName=name.toLowerCase().trim();
    const nameDup=Object.values(leads).find(l=>l.name&&l.name.toLowerCase().trim()===cleanName);
    if(nameDup){
      const msg='⚠️ Same Name Exists!\n\n"'+nameDup.name+'" already in CRM.\nPhone: '+nameDup.phone+'\nStage: '+nameDup.stage+'\n\nStill want to add?';
      if(!confirm(msg))return;
    }
  }

  setSS('wait');
  const id=genId();
  try{
    await set(ref(db,'leads/'+id),{id,name,phone,quality:$('fq').value,source:$('fs').value,project:$('fpr').value,config:$('fc2').value,budget:$('fb').value,stage:'New',followupDate:$('ffu').value,followupTime:$('ffut').value||'',followupMode:'Call',followupStatus:'Pending',notes:$('fno').value,dateAdded:today(),svDone:false,svDate:'',meetingDone:false,meetingDate:'',stageHistory:[{stage:'New',date:new Date().toLocaleString('en-IN')}]});
    toast('✅ Saved: '+name);nav('leads');
  }catch{setSS('err');toast('❌ Save failed');}
};

/* ═══ REMARKS ═══ */
function buildRemarks(remarks, legacyNotes){
  let h='';
  // Show legacy plain-text notes as first entry if exists
  if(legacyNotes && typeof legacyNotes==='string' && legacyNotes.trim() && !Array.isArray(remarks)){
    h+=`<div class="remark-item">
      <div class="remark-dt">📝 Earlier note</div>
      <div class="remark-txt">${legacyNotes.replace(/</g,'&lt;')}</div>
    </div>`;
  }
  // Show timestamped remarks
  if(Array.isArray(remarks)&&remarks.length){
    h+=remarks.slice().reverse().map((r,i)=>`
    <div class="remark-item" id="rem-${i}">
      <button class="remark-del" onclick="delRemark(curDetailId,${remarks.length-1-i})">✕</button>
      <div class="remark-dt">📅 ${r.dt||''}</div>
      <div class="remark-txt">${(r.text||'').replace(/</g,'&lt;')}</div>
    </div>`).join('');
  }
  if(!h) h=`<div style="color:var(--text3);font-size:14px;padding:10px 0">No remarks yet. Add one below.</div>`;
  return h;
}

window.addRemark=async id=>{
  const el=document.getElementById('new-remark');
  const text=(el?el.value:'').trim();
  if(!text){toast('⚠️ Type a remark first');return;}
  const l=leads[id];if(!l)return;
  const now=new Date();
  const dt=now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+' · '+fmt12(now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0'));
  const existing=Array.isArray(l.remarks)?l.remarks:[];
  const updated=[...existing,{text,dt}];
  try{
    await update(ref(db,'leads/'+id),{remarks:updated});
    el.value='';
    toast('✅ Remark added');
  }catch{toast('❌ Failed to save');}
};

window.delRemark=async(id,idx)=>{
  const l=leads[id];if(!l)return;
  if(!confirm('Delete this remark?'))return;
  const updated=(Array.isArray(l.remarks)?l.remarks:[]).filter((_,i)=>i!==idx);
  try{
    await update(ref(db,'leads/'+id),{remarks:updated});
    toast('🗑 Deleted');
  }catch{toast('❌ Failed');}
};

  const a=arr();
  const won=a.filter(l=>l.stage==='Closed Won').sort((x,y)=>{const da=(y.dateAdded||''),db2=(x.dateAdded||'');const c=da.localeCompare(db2);return c!==0?c:(y.id||'').localeCompare(x.id||'');});
  const lost=a.filter(l=>l.stage==='Closed Lost').sort((x,y)=>{const da=(y.dateAdded||''),db2=(x.dateAdded||'');const c=da.localeCompare(db2);return c!==0?c:(y.id||'').localeCompare(x.id||'');});

  function closedCard(l){
    return`<div class="lead-card" style="border-left:4px solid ${l.stage==='Closed Won'?'#1a7a3c':'#c0392b'}" onclick="openDetail('${l.id}')">
      <div class="lc-top"><div><div class="lc-name">${l.name}</div><div class="lc-phone">📞 ${l.phone}</div></div><span class="qb qb-${(l.quality||'cold').toLowerCase()}">${l.quality}</span></div>
      <div class="lc-tags"><span class="stag">${STAGE_ICONS[l.stage]||''} ${l.stage}</span><span class="tag">${l.project}</span><span class="tag">${l.config}</span><span class="tag">₹${l.budget}</span></div>
      ${l.dateAdded?`<div style="font-size:12px;color:var(--text3);margin-top:6px">📅 Added: ${l.dateAdded}</div>`:''}
    </div>`;
  }

  let h=`<div class="pg-hdr"><div class="pg-ttl">Closed Leads</div><div class="pg-sub">${won.length} won · ${lost.length} lost</div></div>`;

  h+=`<div style="display:flex;gap:10px;margin-bottom:16px;padding:0 0px">
    <div style="flex:1;background:#e8f7ee;border-radius:12px;padding:14px 16px;text-align:center">
      <div style="font-size:22px;font-weight:900;color:#1a7a3c">${won.length}</div>
      <div style="font-size:12px;font-weight:700;color:#1a7a3c;opacity:.8">Closed Won</div>
    </div>
    <div style="flex:1;background:#fff2f2;border-radius:12px;padding:14px 16px;text-align:center">
      <div style="font-size:22px;font-weight:900;color:#c0392b">${lost.length}</div>
      <div style="font-size:12px;font-weight:700;color:#c0392b;opacity:.8">Closed Lost</div>
    </div>
  </div>`;

  if(won.length){
    h+=`<div style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#1a7a3c;margin-bottom:10px">🏆 Closed Won</div>`;
    h+=won.map(l=>closedCard(l)).join('');
  }

  if(lost.length){
    h+=`<div style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#c0392b;margin:${won.length?'20px':0} 0 10px">❌ Closed Lost</div>`;
    h+=lost.map(l=>closedCard(l)).join('');
  }

  if(!won.length&&!lost.length){
    h+=`<div style="text-align:center;padding:60px 20px;color:var(--text3)">
      <div style="font-size:48px;margin-bottom:12px">📁</div>
      <div style="font-weight:700;font-size:18px;color:#0a0a0a;margin-bottom:6px">No closed leads yet</div>
      <div style="font-size:14px">Won & lost leads will appear here</div>
    </div>`;
  }

  $('view').innerHTML=`<div style="padding:20px 20px 40px">${h}</div>`;
}

function fmtRev(n){
  if(n>=10000000)return (n/10000000).toFixed(2)+' Cr';
  if(n>=100000)return (n/100000).toFixed(2)+' L';
  return n.toLocaleString('en-IN');
}

function bkField(lbl,href,val,type){
  if(!val)return '';

  return bkField2(lbl,val);
}
function bkField2(lbl,val){
  if(!val)return '';
  return `<div class="bk-field"><div class="bk-field-lbl">${lbl}</div><div class="bk-field-val">${val}</div></div>`;
}

  $('nt-tab-note').style.borderColor=type==='note'?'#0a0a0a':'var(--border)';
  $('nt-tab-cl').style.background=type==='checklist'?'#0a0a0a':'var(--surface)';
  $('nt-tab-cl').style.color=type==='checklist'?'#fff':'var(--text2)';
  $('nt-tab-cl').style.borderColor=type==='checklist'?'#0a0a0a':'var(--border)';
};

window.setNoteColor=(c,el)=>{
  curNoteColor=c;
  document.querySelectorAll('.cp-dot').forEach(d=>d.classList.remove('on'));
  el.classList.add('on');
};

window.toggleNtItem=i=>{
  ntItems[i].done=!ntItems[i].done;
  refreshNtItems();
};

window.removeNtItem=i=>{
  ntItems.splice(i,1);
  if(!ntItems.length)ntItems=[{text:'',done:false}];
  refreshNtItems();
};

window.addNtItem=()=>{
  // Save current input values before adding
  ntItems.forEach((_,i)=>{const el=document.getElementById('ntitem-'+i);if(el)ntItems[i].text=el.value;});
  ntItems.push({text:'',done:false});
  refreshNtItems();
  setTimeout(()=>{const last=document.getElementById('ntitem-'+(ntItems.length-1));if(last)last.focus();},50);
};

window.ntItemEnter=(e,i)=>{
  if(e.key==='Enter'){e.preventDefault();addNtItem();}
};

function refreshNtItems(){
  const container=document.getElementById('nt-items');
  if(!container)return;
  container.innerHTML=ntItems.map((item,i)=>`
    <div class="nt-ci${item.done?' done':''}" id="ntci-${i}">
      <div class="nt-cb" onclick="toggleNtItem(${i})">${item.done?'✓':''}</div>
      <input style="flex:1;border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;outline:none;color:var(--text);${item.done?'text-decoration:line-through;color:var(--text3)':''}" 
        id="ntitem-${i}" value="${(item.text||'').replace(/"/g,'&quot;')}" placeholder="Add item…" onkeydown="ntItemEnter(event,${i})"/>
      <button onclick="removeNtItem(${i})" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);padding:4px">×</button>
    </div>`).join('');
}

window.saveNote=async existingId=>{
  const title=document.getElementById('nt-title')?.value.trim();
  if(!title){toast('⚠️ Please add a title');return;}
  const id=existingId&&existingId!=='null'?existingId:'nt'+Date.now();
  let data={title,color:curNoteColor,type:curNoteType,savedAt:Date.now()};
  if(curNoteType==='note'){
    data.body=document.getElementById('nt-body')?.value.trim()||'';
  } else {
    ntItems.forEach((_,i)=>{const el=document.getElementById('ntitem-'+i);if(el)ntItems[i].text=el.value.trim();});
    data.items=ntItems.filter(i=>i.text);
    if(!data.items.length){toast('⚠️ Add at least one item');return;}
  }
  try{
    await set(ref(db,'notes/'+id),data);
    toast('✅ Note saved!');
    editNoteId=null;
    nav('notes');
  }catch{toast('❌ Save failed');}
};

window.deleteNote=async id=>{
  if(!confirm('Delete this note?'))return;
  await remove(ref(db,'notes/'+id));
  toast('🗑 Note deleted');
  nav('notes');
};
</script>
</body>
</html>
